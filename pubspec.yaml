name: adapters
description: Infrastructure adapters providing concrete implementations for connectivity, DI, HTTP, logging, routing, storage, time services, and network queue management.
publish_to: none
version: 0.0.2

environment:
  sdk: ^3.9.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  bootstrap:
    git: https://github.com/Enri-code/flutter-bootstrap

  # HTTP & Networking
  dio: ^5.9.0
  dio_smart_retry: ^7.0.1
  fresh_dio: ^0.4.4

  # Routing & DI
  go_router: ^17.0.1
  get_it: ^9.0.5

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.3

  # Monitoring & Logging
  sentry_flutter: ^9.8.0

  # Connectivity & Time
  connectivity_plus: ^6.1.3
  ntp: ^2.0.0
  time_config_checker: ^0.0.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
